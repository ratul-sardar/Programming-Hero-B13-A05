<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- css and js -->
    <link rel="stylesheet" href="./style/main.css" />
    <script src="./login.js" defer></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daysiUi -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"
      defer
    ></script>

    <title>GitHub Issue Tracker Login</title>
  </head>

  <!-- Login Card -->

  <body
    class="bg-[#F8FAFC] w-full min-h-screen px-6 flex justify-center items-center"
  >
    <div class="card w-full max-w-130 bg-base-100 card-lg shadow-sm">
      <div class="card-body space-y-6">
        <!-- heading part -->
        <div class="flex flex-col items-center">
          <img src="./assets/github-logo.png" alt="github-logo" class="mb-6" />
          <h2 class="card-title mb-1">GitHub Issues Tracker</h2>
          <p class="text-gray-400">Sign in to manage your issues</p>
        </div>

        <!-- Login Form -->
        <form action="" class="space-y-4">
          <div class="">
            <label for="username" class="block font-medium mb-2"
              >Username</label
            >
            <input
              type="text"
              id="username"
              placeholder="Enter Username"
              class="block mb-1.5 w-full p-4 rounded-lg border-gray-300"
            />
            <p class="text-sm text-primary">Default: admin</p>
          </div>
          <div class="">
            <label for="password" class="block font-medium mb-2"
              >Password</label
            >
            <input
              type="password"
              id="password"
              placeholder="Enter Password"
              class="block mb-1.5 w-full p-4 rounded-lg border-gray-300"
            />
            <p class="text-sm text-primary">Default: admin123</p>
          </div>
        </form>

        <!-- Submit Button -->
        <button class="btn btn-primary font-semibold w-full" onclick="login()">
          Sign In
        </button>

        <!-- Info Area -->
        <p class="text-center">OR</p>

        <div class="text-center space-y-2">
          <p class="text-sm text-gray-400">Demo Credentials:</p>

          <div class="bg-gray-100 rounded-lg p-6">
            <p class=""><span class="font-semibold">Username:</span> admin</p>
            <p class="">
              <span class="font-semibold">Password:</span> admin123
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
